name: DevSecOps CI/CD Pipeline

#
# OBSERVAÇÃO IMPORTANTE
# O GitHub Actions foi utilizado no lugar do GitLab CI
# devido à limitação de memória da máquina local.
#
# Sobre Review Apps:
# O GitHub Actions não possui suporte para ambientes de review.
# Como adaptação, foi implementado deploy
# automático em staging para validação das merge requests.
#
# Sobre DAST:
# Cada job do GitHub Actions é isolado.
# Por isso o ZAP foi executado dentro do mesmo job
# do deploy de staging para permitir comunicação
# com o container da aplicação.
# Sobre o SonarQube:
# Como não é possível rodar o SonarQube localmente, foi utilizado o SonarCloud.

on:
  push:
    branches:
      - main
      - staging
      - development
    tags:
      - 'v*'

  pull_request:
    branches:
      - main
      - staging

jobs:
  build-test-security:
    name: Build, Tests, SAST and SCA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Instalação de dependências
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Validação rápida para garantir que o código é compilável
      - name: Validate Application Build
        run: |
          python -m py_compile $(find . -name "*.py")

      # Execução de testes automatizados com cobertura de código
      - name: Run Pytest Suite with Coverage
        run: |
          pytest \
            --cov=todo_project \
            --cov-report=xml \
            --cov-report=term-missing

      # BANDIT - SAST
      - name: Run Bandit SAST Scan
        run: |
          pip install bandit

          mkdir -p reports

          bandit -r todo_project/ \
            -f json \
            -o reports/bandit-report.json || true

      # PIP-AUDIT - SCA
      - name: Run pip-audit
        run: |
          pip install pip-audit

          pip-audit \
            -r requirements.txt \
            --format json \
            --output reports/pip-audit-report.json || true


      # OWASP DEPENDENCY CHECK
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'task-manager'
          path: '.'
          format: 'HTML'
          out: 'reports'

      # SONARQUBE
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # DEPLOY STAGE + DAST
  deploy-staging:
    name: Deploy to Staging and Execute DAST
    needs: build-test-security
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t task-manager:staging .

      - name: Start Application Container
        run: |
          docker run -d \
            --name staging-task-manager \
            -p 5000:5000 \
            -v /dev/log:/dev/log \
            task-manager:staging

          sleep 15

      # Validação rápida para garantir que a aplicação está respondendo

      - name: Validate Application Availability
        run: |
          curl --fail http://localhost:5000 || exit 1

      # DAST - OWASP ZAP
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a'
          artifact_name: 'zap-baseline-report'

      # Upload do relatório do ZAP para análise posterior
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  # monitoramento - Prometheus + Grafana
  monitoring-validation:
    name: Monitoring Stack Validation
    needs: deploy-staging
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/staging'

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Prometheus and Grafana
        run: |

          cat <<EOF > docker-compose.monitoring.yml
          version: '3.9'

          services:

            prometheus:
              image: prom/prometheus
              container_name: prometheus
              ports:
                - "9090:9090"

            grafana:
              image: grafana/grafana
              container_name: grafana
              ports:
                - "3000:3000"
          EOF

          docker compose -f docker-compose.monitoring.yml up -d

          sleep 20

      - name: Validate Prometheus
        run: |
          curl --fail http://localhost:9090 || exit 1

      - name: Validate Grafana
        run: |
          curl --fail http://localhost:3000 || exit 1

      # Upload da configuração de monitoramento para análise posterior
      - name: Upload Monitoring Configuration
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-config
          path: docker-compose.monitoring.yml